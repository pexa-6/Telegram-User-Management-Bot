services:
  bot:
    build: .
    container_name: telegram_bot
    restart: no
    env_file:
      - .env
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: "Europe/Kyiv"
    user: "1000:1000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "pgrep", "python"]
      interval: 30s
      timeout: 10s
      retries: 3